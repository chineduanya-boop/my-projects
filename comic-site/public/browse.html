<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse All Comics - Manhua, Manga & Manhwa | MangVault</title>
  <meta name="description" content="Browse all free manhua, manga and manhwa on MangVault. Filter by genre, status, and sort by popularity or latest updates. Hundreds of free chapters to read." />
  <meta name="keywords" content="browse manga, browse manhua, free comics list, manga catalogue, manhwa list, MangVault" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://mangvault.com/browse" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.svg" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#e53935" />

  <!-- Preconnect to CDN -->
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://mangvault.com/browse" />
  <meta property="og:title" content="Browse All Comics - Manhua, Manga & Manhwa | MangVault" />
  <meta property="og:description" content="Browse all free manhua, manga and manhwa on MangVault. Filter by genre and sort by popularity." />
  <meta property="og:site_name" content="MangVault" />
  <meta property="og:image" content="https://mangvault.com/og-image.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Browse All Comics | MangVault" />
  <meta name="twitter:description" content="Browse all free manhua, manga and manhwa. Filter by genre, sort by popularity." />
  <meta name="twitter:image" content="https://mangvault.com/og-image.png" />

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "CollectionPage",
    "name": "Browse All Comics",
    "description": "Browse all free manhua, manga and manhwa on MangVault. Filter by genre and sort by popularity.",
    "url": "https://mangvault.com/browse",
    "isPartOf": { "@type": "WebSite", "name": "MangVault", "url": "https://mangvault.com" },
    "breadcrumb": {
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://mangvault.com/" },
        { "@type": "ListItem", "position": 2, "name": "Browse", "item": "https://mangvault.com/browse" }
      ]
    }
  }
  </script>

  <link rel="stylesheet" href="/css/style.css?v=7" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">
        <span class="logo-icon">M</span>
        <span class="logo-text">Manga<span class="logo-accent">Vault</span></span>
      </a>
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/browse" class="active">Browse</a>
        <div class="dropdown">
          <a href="#" class="dropdown-toggle">Genres <i class="fa fa-chevron-down"></i></a>
          <div class="dropdown-menu" id="genreDropdown"></div>
        </div>
      </nav>
      <div class="header-right">
        <form class="search-form" id="searchForm">
          <input type="text" id="searchInput" placeholder="Search comics..." class="search-input" />
          <button type="submit" class="search-btn"><i class="fa fa-search"></i></button>
        </form>
        <a href="/admin" class="admin-link"><i class="fa fa-upload"></i><span> Upload</span></a>
        <button class="hamburger" id="hamburger"><i class="fa fa-bars"></i></button>
      </div>
    </div>
  </header>

  <div class="browse-page">
    <div class="browse-header">
      <h1 id="browseTitle">All Comics</h1>
      <p id="browseCount" class="browse-count"></p>
    </div>

    <!-- FILTERS -->
    <div class="filters-bar">
      <div class="filter-group">
        <label>Genre</label>
        <select id="genreFilter" class="filter-select">
          <option value="">All Genres</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Status</label>
        <select id="statusFilter" class="filter-select">
          <option value="">All</option>
          <option value="Ongoing">Ongoing</option>
          <option value="Completed">Completed</option>
          <option value="Hiatus">Hiatus</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Sort By</label>
        <select id="sortFilter" class="filter-select">
          <option value="updated">Latest Update</option>
          <option value="newest">Newest</option>
          <option value="views">Most Popular</option>
          <option value="title">A-Z</option>
        </select>
      </div>
    </div>

    <!-- GRID -->
    <div class="comics-grid" id="browseGrid"></div>
    <div id="loadMoreArea" class="load-more-area">
      <button id="loadMoreBtn" class="load-more-btn" style="display:none">Load More</button>
      <div id="browseLoading" class="row-loading"><i class="fa fa-spinner fa-spin"></i></div>
      <p id="noResults" class="no-results" style="display:none">No comics found.</p>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-inner">
      <a href="/" class="logo"><span class="logo-icon">M</span><span class="logo-text">Manga<span class="logo-accent">Vault</span></span></a>
      <p class="footer-text">Free manhua, manga &amp; manhwa reading platform. All comics are free to read online.</p>
      <div class="footer-links">
        <a href="/">Home</a>
        <a href="/browse">Browse All</a>
        <a href="/browse?sort=views">Most Popular</a>
        <a href="/browse?sort=updated">New Releases</a>
        <a href="/browse?genre=Action">Action</a>
        <a href="/browse?genre=Romance">Romance</a>
        <a href="/browse?genre=Fantasy">Fantasy</a>
        <a href="/browse?genre=Drama">Drama</a>
      </div>
      <p class="footer-copy">&copy; 2025 MangVault. All rights reserved.</p>
    </div>
  </footer>

  <script src="/js/browse.js?v=6"></script>
</body>
</html>
