<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Comics - MangaVault</title>
  <link rel="stylesheet" href="/css/style.css?v=4" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">
        <span class="logo-icon">M</span>
        <span class="logo-text">Manga<span class="logo-accent">Vault</span></span>
      </a>
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/browse" class="active">Browse</a>
        <div class="dropdown">
          <a href="#" class="dropdown-toggle">Genres <i class="fa fa-chevron-down"></i></a>
          <div class="dropdown-menu" id="genreDropdown"></div>
        </div>
      </nav>
      <div class="header-right">
        <form class="search-form" id="searchForm">
          <input type="text" id="searchInput" placeholder="Search comics..." class="search-input" />
          <button type="submit" class="search-btn"><i class="fa fa-search"></i></button>
        </form>
        <a href="/admin" class="admin-link"><i class="fa fa-upload"></i><span> Upload</span></a>
        <button class="hamburger" id="hamburger"><i class="fa fa-bars"></i></button>
      </div>
    </div>
  </header>

  <div class="browse-page">
    <div class="browse-header">
      <h1 id="browseTitle">All Comics</h1>
      <p id="browseCount" class="browse-count"></p>
    </div>

    <!-- FILTERS -->
    <div class="filters-bar">
      <div class="filter-group">
        <label>Genre</label>
        <select id="genreFilter" class="filter-select">
          <option value="">All Genres</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Status</label>
        <select id="statusFilter" class="filter-select">
          <option value="">All</option>
          <option value="Ongoing">Ongoing</option>
          <option value="Completed">Completed</option>
          <option value="Hiatus">Hiatus</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Sort By</label>
        <select id="sortFilter" class="filter-select">
          <option value="updated">Latest Update</option>
          <option value="newest">Newest</option>
          <option value="views">Most Popular</option>
          <option value="title">A-Z</option>
        </select>
      </div>
    </div>

    <!-- GRID -->
    <div class="comics-grid" id="browseGrid"></div>
    <div id="loadMoreArea" class="load-more-area">
      <button id="loadMoreBtn" class="load-more-btn" style="display:none">Load More</button>
      <div id="browseLoading" class="row-loading"><i class="fa fa-spinner fa-spin"></i></div>
      <p id="noResults" class="no-results" style="display:none">No comics found.</p>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-inner">
      <a href="/" class="logo"><span class="logo-icon">M</span><span class="logo-text">Manga<span class="logo-accent">Vault</span></span></a>
      <p class="footer-text">Free manhua & manga reading platform.</p>
    </div>
  </footer>

  <script src="/js/browse.js"></script>
</body>
</html>
