<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comic - MangVault</title>
  <meta name="robots" content="index, follow" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.svg" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#e53935" />

  <!-- Preconnect to CDN -->
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />

  <link rel="stylesheet" href="/css/style.css?v=7" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">
        <span class="logo-icon">M</span>
        <span class="logo-text">Manga<span class="logo-accent">Vault</span></span>
      </a>
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/browse">Browse</a>
      </nav>
      <div class="header-right">
        <form class="search-form" action="/browse" method="get">
          <input type="text" name="search" placeholder="Search comics..." class="search-input" />
          <button type="submit" class="search-btn"><i class="fa fa-search"></i></button>
        </form>
        <a href="/admin" class="admin-link"><i class="fa fa-upload"></i><span> Upload</span></a>
      </div>
    </div>
  </header>

  <div class="comic-detail-page" id="comicDetailPage">
    <div class="detail-loading"><i class="fa fa-spinner fa-spin fa-2x"></i></div>
  </div>

  <footer class="footer">
    <div class="footer-inner">
      <a href="/" class="logo"><span class="logo-icon">M</span><span class="logo-text">Manga<span class="logo-accent">Vault</span></span></a>
      <p class="footer-text">Free manhua, manga &amp; manhwa reading platform. All comics are free to read online.</p>
      <div class="footer-links">
        <a href="/">Home</a>
        <a href="/browse">Browse All</a>
        <a href="/browse?sort=views">Most Popular</a>
        <a href="/browse?sort=updated">New Releases</a>
        <a href="/browse?genre=Action">Action</a>
        <a href="/browse?genre=Romance">Romance</a>
        <a href="/browse?genre=Fantasy">Fantasy</a>
        <a href="/browse?genre=Drama">Drama</a>
      </div>
      <p class="footer-copy">&copy; 2025 MangVault. All rights reserved.</p>
    </div>
  </footer>

  <script src="/js/comic.js?v=8"></script>
</body>
</html>
