<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comic - MangVault</title>
  <meta name="robots" content="index, follow" />
  <link rel="stylesheet" href="/css/style.css?v=7" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- AGE GATE -->
  <div class="age-gate" id="ageGate" style="display:none">
    <div class="age-gate-box">
      <div class="age-gate-icon">🔞</div>
      <h2>Age Verification</h2>
      <p>This comic contains adult content (18+). Please confirm your age to continue.</p>
      <div class="age-gate-actions">
        <button class="btn-age-confirm" id="ageConfirmBtn">Yes, I am 18 or older</button>
        <a href="/" class="btn-age-exit">Go back to home</a>
      </div>
      <p class="age-gate-note">Your choice will be saved for future visits.</p>
    </div>
  </div>

  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">
        <span class="logo-icon">M</span>
        <span class="logo-text">Manga<span class="logo-accent">Vault</span></span>
      </a>
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/browse">Browse</a>
      </nav>
      <div class="header-right">
        <form class="search-form" action="/browse" method="get">
          <input type="text" name="search" placeholder="Search comics..." class="search-input" />
          <button type="submit" class="search-btn"><i class="fa fa-search"></i></button>
        </form>
        <a href="/admin" class="admin-link"><i class="fa fa-upload"></i><span> Upload</span></a>
      </div>
    </div>
  </header>

  <div class="comic-detail-page" id="comicDetailPage">
    <div class="detail-loading"><i class="fa fa-spinner fa-spin fa-2x"></i></div>
  </div>

  <footer class="footer">
    <div class="footer-inner">
      <a href="/" class="logo"><span class="logo-icon">M</span><span class="logo-text">Manga<span class="logo-accent">Vault</span></span></a>
      <p class="footer-text">Free manhua & manga reading platform.</p>
    </div>
  </footer>

  <script src="/js/comic.js?v=5"></script>
</body>
</html>
